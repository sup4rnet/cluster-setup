- name: Configure netplan static IP
  ansible.builtin.template:
    # Use the first group that has a dedicated netplan template.
    src: "{{ (group_names | intersect(['vms', 'p4switches']) | first) }}/01-netcfg.yaml.j2"
    dest: /etc/netplan/01-netcfg.yaml
  when: (group_names | intersect(['vms', 'p4switches']) | length) > 0
  notify:
    - Apply netplan (run manually on the VM if not triggered)  